<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH - Project Repository</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --card-bg: #f1f5f9;
            --card-hover: #e2e8f0;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --card-bg: #334155;
            --card-hover: #475569;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            padding: 40px 20px;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .header-controls {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .toolbar {
            padding: 20px 40px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .breadcrumb-item {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .breadcrumb-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .breadcrumb-separator {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .search-box {
            flex: 1;
            max-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--container-bg);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .content {
            padding: 32px 40px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .card:hover {
            background: var(--card-hover);
            border-color: var(--border-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .card h3 {
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 1rem;
            font-weight: 600;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-item {
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .file-item:hover {
            background: var(--card-hover);
            border-color: var(--border-color);
        }

        .file-item.hidden {
            display: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .file-icon {
            font-size: 1.8rem;
        }

        .file-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .file-desc {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .download-btn {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--container-bg);
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .modal h3 {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .modal-btn.primary {
            background: var(--primary);
            color: white;
        }

        .modal-btn.primary:hover {
            background: var(--primary-dark);
        }

        .modal-btn.secondary {
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .modal-btn.secondary:hover {
            background: var(--card-hover);
        }

        .footer {
            padding: 20px 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .ai-assistant {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
        }

        .ai-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-button:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .ai-chat {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            max-height: 500px;
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: none;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .ai-chat.active {
            display: flex;
        }

        .ai-chat-header {
            padding: 16px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ai-chat-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-chat-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .ai-chat-close:hover {
            background: var(--card-hover);
            color: var(--text-primary);
        }

        .ai-chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .ai-message,
        .user-message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            animation: slideIn 0.3s ease;
        }

        .ai-message {
            background: var(--card-bg);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }

        .user-message {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 4px;
        }

        .ai-message-content,
        .user-message-content {
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .ai-chat-input {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .ai-chat-input input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            background: var(--container-bg);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .ai-chat-input input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .ai-chat-input button {
            padding: 10px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ai-chat-input button:hover {
            background: var(--primary-dark);
        }

        .quick-replies {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-reply {
            padding: 6px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .quick-reply:hover {
            background: var(--card-hover);
            border-color: var(--primary);
        }

        .ai-tool {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            height: 90vh;
            max-height: 600px;
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .ai-tool.active {
            display: flex;
        }

        .ai-tool-header {
            padding: 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ai-tool-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-tool-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .ai-tool-close:hover {
            background: var(--card-hover);
            color: var(--text-primary);
        }

        .ai-tool-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .ai-tool-sidebar {
            width: 200px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
            overflow-y: auto;
        }

        .ai-tool-menu-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .ai-tool-menu-item:hover {
            background: var(--card-hover);
            color: var(--text-primary);
        }

        .ai-tool-menu-item.active {
            background: rgba(99, 102, 241, 0.1);
            border-left-color: var(--primary);
            color: var(--primary);
            font-weight: 500;
        }

        .ai-tool-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ai-tool-input-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .ai-tool-input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .ai-tool-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
            background: var(--container-bg);
            color: var(--text-primary);
            resize: vertical;
            font-family: inherit;
            transition: all 0.2s;
        }

        .ai-tool-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .ai-tool-options {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .ai-tool-option {
            padding: 6px 12px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .ai-tool-option:hover {
            background: var(--card-hover);
            border-color: var(--primary);
            color: var(--primary);
        }

        .ai-tool-option.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .ai-tool-button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .ai-tool-button:hover {
            background: var(--primary-dark);
        }

        .ai-tool-button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .ai-tool-output-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            flex: 1;
            overflow-y: auto;
        }

        .ai-tool-output-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-tool-output-content {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .ai-tool-output-content code {
            background: var(--container-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .ai-tool-output-content pre {
            background: var(--container-bg);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.8rem;
            margin: 12px 0;
        }

        .ai-tool-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .ai-tool-overlay.active {
            display: block;
        }

        .ai-tool-trigger {
            position: fixed;
            bottom: 30px;
            right: 100px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 998;
        }

        .ai-tool-trigger:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .game-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            height: 90vh;
            max-height: 600px;
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .game-container.active {
            display: flex;
        }

        .game-header {
            padding: 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .game-close:hover {
            background: var(--card-hover);
            color: var(--text-primary);
        }

        .game-body {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .game-canvas-container {
            flex: 1;
            background: #f0f0f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #gameCanvas {
            background: #87CEEB;
            border-radius: 8px;
            cursor: crosshair;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .game-score {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .game-button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .game-button:hover {
            background: var(--primary-dark);
        }

        .game-button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .game-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }
            
            .header {
                padding: 32px 24px;
            }
            
            .header h1 {
                font-size: 1.75rem;
            }
            
            .toolbar {
                flex-direction: column;
                padding: 16px 24px;
                gap: 12px;
            }
            
            .search-box {
                max-width: 100%;
                width: 100%;

        const data = {

                    icon: '🔧',
                    desc: { zh: '工具软件', en: 'Tools' },
                    branches: [],
                    files: [
                        {
                            name: 'SIoT_V2.zip',
                            icon: '📦',
                            desc: { zh: 'SIoT物联网平台', en: 'SIoT IoT Platform' },
                            url: 'https://github.com/LSHqwq/LSH/raw/main/SIoT_V2.zip'
                        }
                    ]
                }
            },
            currentPath: ['main']
        };

        let currentLang = 'zh';
        let currentDownload = null;

        function t(key) {
            return i18n[currentLang][key];
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('lang-btn').textContent = currentLang === 'zh' ? 'EN' : '中文';
            renderPage();
            updateAiLanguage();
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
        }

        function goHome() {
            data.currentPath = ['main'];
            renderPage();
        }

        function renderPage() {
            const branchName = data.currentPath[data.currentPath.length - 1];
            const branch = data.branches[branchName];

            document.getElementById('subtitle').textContent = t('subtitle');
            document.getElementById('search-input').placeholder = t('searchPlaceholder');

            renderBreadcrumb();
            renderContent(branch);
        }

        function renderBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="goHome()">' + t('home') + '</span>';

            if (data.currentPath.length > 1) {
                for (let i = 1; i < data.currentPath.length; i++) {
                    html += '<span class="breadcrumb-separator">/</span>';
                    const path = data.currentPath.slice(0, i + 1);
                    html += '<span class="breadcrumb-item" onclick="goToPath(' + JSON.stringify(path) + ')">' + data.branches[data.currentPath[i]].name + '</span>';
                }
            }

            breadcrumb.innerHTML = html;
        }

        function goToPath(path) {
            data.currentPath = path;
            renderPage();
        }

        function renderContent(branch) {
            const content = document.getElementById('content');
            let html = '';

            if (branch.branches.length > 0) {
                html += '<div class="section-title">' + t('branches') + '</div>';
                html += '<div class="grid">';
                branch.branches.forEach(b => {
                    const subBranch = data.branches[b];
                    html += '<div class="card" onclick="openBranch(\'' + b + '\')"><div class="card-icon">' + subBranch.icon + '</div><h3>' + subBranch.name + '</h3><p>' + subBranch.desc[currentLang] + '</p></div>';
                });
                html += '</div>';
            }

            if (branch.files.length > 0) {
                html += '<div class="section-title">' + t('files') + '</div>';
                html += '<div class="file-list">';
                branch.files.forEach(file => {
                    html += '<div class="file-item" onclick="showDownloadModal(\'' + file.name + '\', \'' + file.icon + '\', \'' + file.url + '\')"><div class="file-info"><span class="file-icon">' + file.icon + '</span><div><div class="file-name">' + file.name + '</div><div class="file-desc">' + file.desc[currentLang] + '</div></div></div><button class="download-btn" onclick="event.stopPropagation(); showDownloadModal(\'' + file.name + '\', \'' + file.icon + '\', \'' + file.url + '\')">' + t('download') + '</button></div>';
                });
                html += '</div>';
            }

            if (branch.branches.length === 0 && branch.files.length === 0) {
                html += '<div class="empty-state"><div class="empty-state-icon">📭</div><p>' + t('empty') + '</p></div>';
            }

            content.innerHTML = html;
        }

        function openBranch(branchName) {
            data.currentPath.push(branchName);
            renderPage();
        }

        function searchFiles() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const fileItems = document.querySelectorAll('.file-item');
            const cards = document.querySelectorAll('.card');

            fileItems.forEach(item => {
                const fileName = item.querySelector('.file-name').textContent.toLowerCase();
                const fileDesc = item.querySelector('.file-desc').textContent.toLowerCase();
                if (fileName.includes(searchTerm) || fileDesc.includes(searchTerm) || searchTerm === '') {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });

            cards.forEach(card => {
                const cardTitle = card.querySelector('h3').textContent.toLowerCase();
                const cardDesc = card.querySelector('p').textContent.toLowerCase();
                if (cardTitle.includes(searchTerm) || cardDesc.includes(searchTerm) || searchTerm === '') {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function showDownloadModal(filename, icon, url) {
            currentDownload = { filename, icon, url };
            document.getElementById('modal-icon').textContent = icon;
            document.getElementById('modal-title').textContent = t('downloadTitle');
            document.getElementById('modal-text').textContent = t('downloadText') + ' "' + filename + '"';
            document.getElementById('modal-confirm').textContent = t('githubDownload');
            document.querySelector('.modal-btn.secondary').textContent = t('cancel');
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentDownload = null;
        }

        document.getElementById('modal-confirm').addEventListener('click', function() {
            if (currentDownload) {
                window.open(currentDownload.url, '_blank');
                closeModal();
            }
        });

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        let aiChatOpen = false;

        function toggleAiChat() {
            aiChatOpen = !aiChatOpen;
            const chat = document.getElementById('ai-chat');
            if (aiChatOpen) {
                chat.classList.add('active');
                if (document.getElementById('ai-messages').children.length === 0) {
                    addAiMessage(t('aiGreeting'));
                }
            } else {
                chat.classList.remove('active');
            }
        }

        function addAiMessage(message) {
            const messages = document.getElementById('ai-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'ai-message';
            messageDiv.innerHTML = '<div class="ai-message-content">' + message.replace(/\n/g, '<br>') + '</div>';
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function addUserMessage(message) {
            const messages = document.getElementById('ai-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'user-message';
            messageDiv.innerHTML = '<div class="user-message-content">' + message + '</div>';
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('ai-input');
            const message = input.value.trim();
            if (message) {
                addUserMessage(message);
                input.value = '';
                setTimeout(() => {
                    respondToMessage(message);
                }, 500);
            }
        }

        function sendQuickReply(reply) {
            addUserMessage(reply);
            setTimeout(() => {
                respondToMessage(reply);
            }, 500);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function respondToMessage(message) {
            const lowerMessage = message.toLowerCase();
            
            const downloadKeywords = ['下载', 'download', '保存', 'save', '获取', 'get', '怎么下载', '如何下载', '怎样下载'];
            const languageKeywords = ['语言', 'language', '切换', 'change', '英文', 'english', '中文', 'chinese', '切换语言', '如何切换', '怎样切换'];
            const visitKeywords = ['访问', 'visit', '网站', 'website', '网址', 'url', '怎么访问', '如何访问', '怎样访问', '打开', 'open'];
            const aboutKeywords = ['什么', 'what', '介绍', 'introduce', '这是', 'this is', '干嘛', 'what is', '是什么', 'what\'s'];
            const thanksKeywords = ['谢谢', 'thanks', 'thank', '感谢', 'grateful', '感恩', '感谢你'];
            
            if (downloadKeywords.some(keyword => lowerMessage.includes(keyword))) {
                addAiMessage(t('aiDownloadHelp'));
            } else if (languageKeywords.some(keyword => lowerMessage.includes(keyword))) {
                addAiMessage(t('aiLanguageHelp'));
            } else if (visitKeywords.some(keyword => lowerMessage.includes(keyword))) {
                addAiMessage(t('aiVisitHelp'));
            } else if (aboutKeywords.some(keyword => lowerMessage.includes(keyword))) {
                addAiMessage(t('aiAbout'));
            } else if (thanksKeywords.some(keyword => lowerMessage.includes(keyword))) {
                addAiMessage(t('aiThanks'));
            } else if (lowerMessage.includes('你好') || lowerMessage.includes('hi') || lowerMessage.includes('hello') || lowerMessage.includes('嘿')) {
                addAiMessage(t('aiHello'));
            } else if (lowerMessage.includes('你是谁') || lowerMessage.includes('who are you') || lowerMessage.includes('what are you')) {
                addAiMessage(t('aiWhoAmI'));
            } else if (lowerMessage.includes('帮助') || lowerMessage.includes('help') || lowerMessage.includes('assist')) {
                addAiMessage(t('aiHelp'));
            } else if (lowerMessage.includes('功能') || lowerMessage.includes('function') || lowerMessage.includes('feature')) {
                addAiMessage(t('aiFeatures'));
            } else if (lowerMessage.includes('siot') || lowerMessage.includes('iot')) {
                lastTopic = 'siot';
                if (lowerMessage.includes('用') || lowerMessage.includes('干') || lowerMessage.includes('功能') || lowerMessage.includes('what') || lowerMessage.includes('use') || lowerMessage.includes('function')) {
                    addAiMessage(t('aiSiotFunction'));
                } else {
                    addAiMessage(t('aiSiotLocation'));
                }
            } else if ((lowerMessage.includes('它') || lowerMessage.includes('这个') || lowerMessage.includes('那个') || lowerMessage.includes('this') || lowerMessage.includes('that')) && lastTopic === 'siot') {
                if (lowerMessage.includes('用') || lowerMessage.includes('干') || lowerMessage.includes('功能') || lowerMessage.includes('what') || lowerMessage.includes('use') || lowerMessage.includes('function')) {
                    addAiMessage(t('aiSiotFunction'));
                } else if (lowerMessage.includes('在哪') || lowerMessage.includes('位置') || lowerMessage.includes('where')) {
                    addAiMessage(t('aiSiotLocation'));
                } else {
                    addAiMessage(t('aiSiotFunction'));
                }
            } else {
                addAiMessage(t('aiError'));
            }
        }

        function updateAiLanguage() {
            document.querySelector('.ai-chat-title').textContent = t('aiTitle');
            document.getElementById('ai-input').placeholder = t('aiPlaceholder');
            document.querySelector('.ai-chat-input button').textContent = t('aiSend');
            updateAiToolLanguage();
        }

        let currentAiTool = 'text-summarize';
        let aiToolOpen = false;
        let lastTopic = null;

        function toggleAiTool() {
            aiToolOpen = !aiToolOpen;
            const tool = document.getElementById('ai-tool');
            const overlay = document.getElementById('ai-tool-overlay');
            if (aiToolOpen) {
                tool.classList.add('active');
                overlay.classList.add('active');
            } else {
                tool.classList.remove('active');
                overlay.classList.remove('active');
            }
        }

        function updateAiToolLanguage() {
            document.querySelector('.ai-tool-title').textContent = t('aiToolTitle');
            document.querySelector('.ai-tool-menu-item[data-tool="text-summarize"]').textContent = t('aiToolSummarize');
            document.querySelector('.ai-tool-menu-item[data-tool="code-explain"]').textContent = t('aiToolCode');
            document.querySelector('.ai-tool-menu-item[data-tool="translate"]').textContent = t('aiToolTranslate');
            document.querySelector('.ai-tool-menu-item[data-tool="grammar-check"]').textContent = t('aiToolGrammar');
            document.querySelector('.ai-tool-menu-item[data-tool="ideas"]').textContent = t('aiToolIdeas');
            document.querySelector('.ai-tool-menu-item[data-tool="math"]').textContent = t('aiToolMath');
            document.getElementById('ai-tool-submit').textContent = t('aiToolSubmit');
            document.querySelector('.ai-tool-output-title').textContent = t('aiToolOutputTitle');
            document.getElementById('ai-tool-output').textContent = t('aiToolWaiting');
            updateToolOptions();
        }

        function updateToolOptions() {
            const optionsContainer = document.getElementById('ai-tool-options');
            optionsContainer.innerHTML = '';
            
            let options = [];
            switch(currentAiTool) {
                case 'text-summarize':
                    options = t('aiToolOptions').summarize;
                    document.getElementById('ai-tool-input-label').textContent = '输入文本进行总结';
                    document.getElementById('ai-tool-textarea').placeholder = '请输入要总结的文本...';
                    break;
                case 'code-explain':
                    document.getElementById('ai-tool-input-label').textContent = '输入代码进行解释';
                    document.getElementById('ai-tool-textarea').placeholder = '请输入要解释的代码...';
                    break;
                case 'translate':
                    options = t('aiToolOptions').translate;
                    document.getElementById('ai-tool-input-label').textContent = '输入文本进行翻译';
                    document.getElementById('ai-tool-textarea').placeholder = '请输入要翻译的文本...';
                    break;
                case 'grammar-check':
                    options = t('aiToolOptions').grammar;
                    document.getElementById('ai-tool-input-label').textContent = '输入文本进行语法检查';
                    document.getElementById('ai-tool-textarea').placeholder = '请输入要检查的文本...';
                    break;
                case 'ideas':
                    options = t('aiToolOptions').ideas;
                    document.getElementById('ai-tool-input-label').textContent = '输入主题生成创意';
                    document.getElementById('ai-tool-textarea').placeholder = '请输入主题或关键词...';
                    break;
                case 'math':
                    options = t('aiToolOptions').math;
                    document.getElementById('ai-tool-input-label').textContent = '输入数学问题';
                    document.getElementById('ai-tool-textarea').placeholder = '请输入数学表达式或问题...';
                    break;
            }

            options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'ai-tool-option' + (index === 0 ? ' active' : '');
                optionElement.textContent = option;
                optionElement.onclick = function() {
                    document.querySelectorAll('.ai-tool-option').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');
                };
                optionsContainer.appendChild(optionElement);
            });
        }

        document.querySelectorAll('.ai-tool-menu-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.ai-tool-menu-item').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                currentAiTool = this.getAttribute('data-tool');
                updateToolOptions();
            });
        });

        function runAiTool() {
            const input = document.getElementById('ai-tool-textarea').value.trim();
            if (!input) {
                document.getElementById('ai-tool-output').textContent = '请输入内容';
                return;
            }

            document.getElementById('ai-tool-output').textContent = t('aiToolProcessing');

            setTimeout(() => {
                let result = '';
                
                switch(currentAiTool) {
                    case 'text-summarize':
                        result = generateSummary(input);
                        break;
                    case 'code-explain':
                        result = explainCode(input);
                        break;
                    case 'translate':
                        result = translateText(input);
                        break;
                    case 'grammar-check':
                        result = checkGrammar(input);
                        break;
                    case 'ideas':
                        result = generateIdeas(input);
                        break;
                    case 'math':
                        result = solveMath(input);
                        break;
                }

                document.getElementById('ai-tool-output').innerHTML = result;
            }, 1000);
        }

        function generateSummary(text) {
            const sentences = text.split(/[。！？.!?]/).filter(s => s.trim());
            const summary = sentences.slice(0, 3).join('。') + '。';
            return `## 文本总结\n\n**核心内容：** ${summary}\n\n**要点提取：**\n- 文本主要讨论了...\n- 包含重要信息...\n- 提出了关键观点...\n\n**总结：** 这是一段关于${text.length > 20 ? text.substring(0, 20) + '...' : text}的文本。`;
        }

        function explainCode(code) {
            let language = '通用';
            let features = [];
            
            if (code.includes('def ') || code.includes('import ') || code.includes('print(') || code.includes('python')) {
                language = 'Python';
                features.push('使用了Python语法');
                if (code.includes('def ')) features.push('定义了函数');
                if (code.includes('class ')) features.push('定义了类');
                if (code.includes('import ')) features.push('导入了模块');
                if (code.includes('print(')) features.push('包含输出语句');
            } else if (code.includes('function ') || code.includes('const ') || code.includes('let ') || code.includes('console.log(') || code.includes('node')) {
                language = 'JavaScript/Node.js';
                features.push('使用了JavaScript语法');
                if (code.includes('function ')) features.push('定义了函数');
                if (code.includes('const ') || code.includes('let ')) features.push('声明了变量');
                if (code.includes('console.log(')) features.push('包含控制台输出');
            }
            
            return `## 代码解释\n\n**语言识别：** ${language}\n\n**代码分析：**\n\n${code}\n\n**功能说明：**\n- 这段代码实现了...功能\n- ${features.length > 0 ? features.join('\n- ') : '使用了基本编程结构'}\n- 通过${code.includes('if') ? '条件判断' : code.includes('for') || code.includes('while') ? '循环结构' : '其他方式'}实现逻辑\n\n**优化建议：**\n- 可以考虑使用更简洁的写法\n- 添加适当的注释提高可读性\n- 考虑错误处理机制\n- 遵循相应语言的最佳实践`;
        }

        function translateText(text) {
            const activeOption = document.querySelector('.ai-tool-option.active').textContent;
            let translation = '';
            
            if (activeOption.includes('中文→英文')) {
                translation = `**英文翻译：** This is a translation of the input text.`;
            } else if (activeOption.includes('英文→中文')) {
                translation = `**中文翻译：** 这是输入文本的翻译。`;
            } else if (activeOption.includes('中文→日文')) {
                translation = `**日文翻译：** これは入力テキストの翻訳です。`;
            } else if (activeOption.includes('英文→日文')) {
                translation = `**日文翻译：** これは入力テキストの翻訳です。`;
            }
            
            return `## 翻译结果\n\n${translation}\n\n**原文：** ${text}`;
        }

        function checkGrammar(text) {
            return `## 语法检查结果\n\n**检查内容：**\n- 语法结构：良好\n- 拼写检查：未发现错误\n- 标点符号：使用正确\n- 语句流畅度：良好\n\n**建议：**\n- 可以考虑使用更丰富的词汇\n- 调整句子结构，使表达更加清晰\n- 添加适当的连接词，提高可读性`;
        }

        function generateIdeas(topic) {
            return `## 创意生成\n\n**主题：** ${topic}\n\n**创意建议：**\n1. **角度一：** 从${topic}的历史发展角度进行分析\n2. **角度二：** 探讨${topic}在现代社会的应用\n3. **角度三：** 分析${topic}的未来发展趋势\n\n**内容大纲：**\n- 引言：介绍${topic}的重要性\n- 主体：分三个部分详细阐述\n- 结论：总结观点，提出建议\n\n**写作建议：** 使用生动的例子和数据支持论点`;
        }

        function solveMath(expression) {
            try {
                const result = eval(expression.replace(/×/g, '*').replace(/÷/g, '/'));
                return `## 数学计算\n\n**计算表达式：** ${expression}\n\n**计算结果：** ${result}\n\n**计算过程：**\n1. ${expression}\n2. = ${result}`;
            } catch (error) {
                return `## 数学计算\n\n**计算表达式：** ${expression}\n\n**错误：** 无法计算，请检查表达式格式`;
            }
        }

        renderPage();
        updateAiLanguage();
        initGame();

        function initGame() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let score = 0;
            let gameRunning = false;
            let bullets = [];
            let enemies = [];
            let player = { x: canvas.width / 2, y: canvas.height - 50, width: 40, height: 40, speed: 5 };
            let keys = {};

            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;
            });

            document.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            canvas.addEventListener('click', (e) => {
                if (!gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                fireBullet(x, y);
            });

            function fireBullet(targetX, targetY) {
                const angle = Math.atan2(targetY - player.y, targetX - player.x);
                bullets.push({
                    x: player.x + player.width / 2,
                    y: player.y,
                    dx: Math.cos(angle) * 8,
                    dy: Math.sin(angle) * 8,
                    width: 4,
                    height: 10
                });
            }

            function spawnEnemy() {
                enemies.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    width: 30,
                    height: 30,
                    speed: 2 + Math.random() * 2
                });
            }

            function update() {
                if (!gameRunning) return;

                if (keys['ArrowLeft'] && player.x > 0) {
                    player.x -= player.speed;
                }
                if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                    player.x += player.speed;
                }

                bullets.forEach((bullet, index) => {
                    bullet.x += bullet.dx;
                    bullet.y += bullet.dy;
                    if (bullet.x< 0 || bullet.x >canvas.width || bullet.y< 0 || bullet.y >canvas.height) {
                        bullets.splice(index, 1);
                    }
                });

                enemies.forEach((enemy, index) => {
                    enemy.y += enemy.speed;
                    if (enemy.y > canvas.height) {
                        enemies.splice(index, 1);
                    }
                });

                bullets.forEach((bullet, bulletIndex) => {
                    enemies.forEach((enemy, enemyIndex) => {
                        if (bullet.x < enemy.x + enemy.width &&
                            bullet.x + bullet.width > enemy.x &&
                            bullet.y< enemy.y + enemy.height &&
                            bullet.y + bullet.height >enemy.y) {
                            bullets.splice(bulletIndex, 1);
                            enemies.splice(enemyIndex, 1);
                            score += 10;
                            document.getElementById('game-score').textContent = score;
                        }
                    });
                });

                if (Math.random()< 0.02) {
                    spawnEnemy();
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#32CD32';
                ctx.fillRect(player.x, player.y, player.width, player.height);

                bullets.forEach(bullet => {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                });

                enemies.forEach(enemy => {
                    ctx.fillStyle = '#FF4500';
                    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                });
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            window.openGame = function() {
                document.getElementById('game-container').classList.add('active');
                document.getElementById('game-overlay').classList.add('active');
            }

            window.closeGame = function() {
                gameRunning = false;
                document.getElementById('game-container').classList.remove('active');
                document.getElementById('game-overlay').classList.remove('active');
                score = 0;
                bullets = [];
                enemies = [];
                player.x = canvas.width / 2;
                document.getElementById('game-score').textContent = score;
                document.getElementById('game-start').textContent = '开始游戏';
            }

            document.getElementById('game-start').addEventListener('click', function() {
                if (!gameRunning) {
                    gameRunning = true;
                    this.textContent = '重新开始';
                    score = 0;
                    bullets = [];
                    enemies = [];
                    document.getElementById('game-score').textContent = score;
                } else {
                    gameRunning = false;
                    this.textContent = '开始游戏';
                    bullets = [];
                    enemies = [];
                }
            });

            gameLoop();
        }
    </script>
</body>
